<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedall Energy - Connexion SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-full flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950">

    <div class="max-w-md w-full space-y-8 bg-slate-900/90 border border-slate-800 p-8 rounded-2xl shadow-2xl backdrop-blur-md">
        
        <div class="text-center space-y-2">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600/20 text-indigo-400 rounded-2xl border border-indigo-500/30 mb-2">
                <i class="fa-solid fa-bolt text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Dedall Energy Engine</h2>
            <p class="text-sm text-slate-400">Plateforme SaaS d'Outreach & Prospection B2B</p>
        </div>

        <div id="registerSuccess" class="hidden bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-4 py-3 rounded-xl text-xs text-center">
            <i class="fa-solid fa-circle-check mr-1"></i> Compte créé avec succès ! Connecte-toi ci-dessous.
        </div>

        <div class="flex border-b border-slate-800">
            <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-3 text-sm font-semibold text-indigo-400 border-b-2 border-indigo-500 focus:outline-none transition-all">
                Se connecter
            </button>
            <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 focus:outline-none transition-all">
                S'inscrire
            </button>
        </div>

        <form id="formLogin" action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5 uppercase tracking-wider">Adresse E-mail</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required placeholder="nom@entreprise.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5 uppercase tracking-wider">Mot de passe</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-indigo-900/30 transition-all text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i>
                Accéder à l'Espace Pro
            </button>
        </form>

        <form id="formRegister" action="/register" method="POST" class="space-y-5 hidden">
            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5 uppercase tracking-wider">Votre E-mail Professionnel</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required placeholder="nom@entreprise.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5 uppercase tracking-wider">Créer un Mot de passe</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" minlength="6" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-emerald-900/30 transition-all text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus"></i>
                Créer mon compte SaaS
            </button>
        </form>

        <div class="pt-4 border-t border-slate-800/80 text-center text-xs text-slate-500 space-y-1">
            <p><i class="fa-solid fa-shield-halved text-indigo-400 mr-1"></i> Connexion sécurisée par Token JWT 256-bit</p>
            <p>© 2026 Dedall Energy — Tous droits réservés.</p>
        </div>

    </div>

    <script>
        // Afficher l'alerte de succès si l'utilisateur vient de s'inscrire
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered') === 'true') {
            document.getElementById('registerSuccess').classList.remove('hidden');
        }

        // Gestion du basculement entre les onglets Connexion et Inscription
        function switchTab(type) {
            const formLogin = document.getElementById('formLogin');
            const formRegister = document.getElementById('formRegister');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (type === 'login') {
                formLogin.classList.remove('hidden');
                formRegister.classList.add('hidden');
                
                tabLogin.className = "flex-1 py-3 text-sm font-semibold text-indigo-400 border-b-2 border-indigo-500 focus:outline-none transition-all";
                tabRegister.className = "flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 focus:outline-none transition-all";
            } else {
                formLogin.classList.add('hidden');
                formRegister.classList.remove('hidden');
                
                tabRegister.className = "flex-1 py-3 text-sm font-semibold text-emerald-400 border-b-2 border-emerald-500 focus:outline-none transition-all";
                tabLogin.className = "flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 focus:outline-none transition-all";
            }
        }
    </script>
</body>
</html>
